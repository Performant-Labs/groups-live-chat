# Conduit Matrix homeserver configuration for local development.
# Production would swap this for Synapse + PostgreSQL.
[global]
server_name = "chat.ddev.site"
database_backend = "rocksdb"
database_path = "/var/lib/matrix-conduit/"
port = 6167
max_request_size = 20_000_000
allow_registration = false
allow_federation = false
address = "0.0.0.0"
appservice_registration_files = ["/etc/conduit/appservice-drupal.yaml"]
