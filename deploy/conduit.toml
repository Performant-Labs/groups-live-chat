# Production Conduit configuration for chat.performantlabs.com
[global]
server_name = "chat.performantlabs.com"
database_backend = "rocksdb"
database_path = "/var/lib/matrix-conduit/"
port = 6167
address = "0.0.0.0"
allow_registration = false
allow_federation = false
trusted_servers = []
max_request_size = 20_000_000
log = "warn"
