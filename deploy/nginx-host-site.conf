server {
    server_name chat.performantlabs.com;

    # Logging
    access_log /var/log/nginx/groups_chat_access.log;
    error_log /var/log/nginx/groups_chat_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Docker container on port 8083
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-poll sync requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 64M;
    }

    listen 80;
    listen [::]:80;
}
