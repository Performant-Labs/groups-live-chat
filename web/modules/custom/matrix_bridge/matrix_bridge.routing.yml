# Appservice webhook: receives transaction pushes from Conduit/Synapse.
matrix_bridge.appservice_transactions:
  path: '/matrix/appservice/transactions/{txnId}'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\AppserviceController::handleTransaction'
  methods: [PUT]
  requirements:
    _custom_access: '\Drupal\matrix_bridge\Controller\AppserviceController::access'
    txnId: '.+'

# Chat panel: full page with HTMX chat UI for a group.
matrix_bridge.chat_panel:
  path: '/group/{group_id}/chat'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\ChatController::panel'
    _title: 'Group Chat'
  requirements:
    _permission: 'access content'
    group_id: '\d+'

# Messages fragment: HTMX partial for the message list.
matrix_bridge.chat_messages:
  path: '/group/{group_id}/chat/messages'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\ChatController::messages'
  requirements:
    _permission: 'access content'
    group_id: '\d+'

# Send message: HTMX POST handler.
matrix_bridge.chat_send:
  path: '/group/{group_id}/chat/send'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\ChatController::send'
  methods: [POST]
  requirements:
    _permission: 'access content'
    group_id: '\d+'

# Sync proxy: long-polls Conduit /sync and returns new messages as JSON.
matrix_bridge.chat_sync:
  path: '/group/{group_id}/chat/sync'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\SyncController::sync'
  requirements:
    _permission: 'access content'
    group_id: '\d+'

# Edit message: PATCH handler for updating a message body.
matrix_bridge.chat_edit:
  path: '/group/{group_id}/chat/message/{message_id}/edit'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\ChatController::edit'
  methods: [PATCH]
  requirements:
    _permission: 'access content'
    group_id: '\d+'
    message_id: '\d+'

# Delete message: DELETE handler for soft-deleting a message.
matrix_bridge.chat_delete:
  path: '/group/{group_id}/chat/message/{message_id}/delete'
  defaults:
    _controller: '\Drupal\matrix_bridge\Controller\ChatController::delete'
  methods: [DELETE]
  requirements:
    _permission: 'access content'
    group_id: '\d+'
    message_id: '\d+'
